<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#FFF8F5"/>
<meta name="description" content="お探しのページが見つかりませんでした。わんちゃん成長日記のトップページへ移動できます。"/>
<title>ページが見つからないよ - わんちゃん成長日記</title>
<script>
// GitHub Pages SPA redirect: preserve path for client-side routing
(function() {
  var path = window.location.pathname;
  var base = '/wanchan-seichou-nikki/';
  if (path.startsWith(base)) {
    var route = path.slice(base.length);
    if (route && route !== 'index.html') {
      window.location.replace(base + '?route=' + encodeURIComponent(route) + window.location.search.replace('?', '&') + window.location.hash);
      return;
    }
  }
  window.location.replace(base);
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Maru Gothic','Hiragino Sans',sans-serif;background:#FFF8F5;display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center;color:#3D2C2C}
.c{max-width:320px}.icon{font-size:64px;margin-bottom:16px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:20px;font-weight:900;margin-bottom:8px}
p{font-size:14px;color:#8A6F6A;line-height:1.7;margin-bottom:24px}
a{display:inline-block;background:linear-gradient(135deg,#F5A6B8,#FF7B9C);color:#fff;text-decoration:none;padding:14px 32px;border-radius:14px;font-size:15px;font-weight:700;font-family:inherit;transition:transform .15s}
a:active{transform:scale(.97)}
a:hover{transform:scale(1.02)}
@media(prefers-color-scheme:dark){
  body{background:#1a1210;color:#e8d8d0}
  h1{color:#e8d8d0}
  p{color:#a89490}
}
</style>
</head>
<body>
<noscript>
<div class="c">
<div class="icon">🐾</div>
<h1>あれ？ページが見つからないよ</h1>
<p>探しているページはお引っ越ししちゃったみたい。<br>トップページから探してみてね。</p>
<a href="/wanchan-seichou-nikki/" role="button">トップページへ戻る</a>
</div>
</noscript>
<!-- JS有効時のフォールバック（リダイレクト前に一瞬表示） -->
<div class="c" id="fallback" style="display:none;">
<div class="icon">🐾</div>
<h1>トップページに移動するよ...</h1>
</div>
<script>document.getElementById('fallback').style.display='';</script>
</body>
</html>
