<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Zen Maru Gothic','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
input,textarea,select,button{font-family:inherit;}
img{max-width:100%;height:auto;}

/* === UI/UX Enhancement Layer === */

/* Toast System */
.ux-toast-container{position:fixed;top:env(safe-area-inset-top,16px);left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:400px;padding-top:12px;}
.ux-toast{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:16px;background:rgba(30,30,30,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff;font-size:14px;font-weight:600;line-height:1.4;box-shadow:0 8px 32px rgba(0,0,0,.18);animation:ux-toast-in .35s cubic-bezier(.175,.885,.32,1.275);opacity:1;transition:opacity .25s,transform .25s;}
.ux-toast.ux-toast-out{opacity:0;transform:translateY(-12px);}
.ux-toast-icon{font-size:18px;flex-shrink:0;}
.ux-toast-success{border-left:3px solid #16A34A;}
.ux-toast-error{border-left:3px solid #EF4444;}
.ux-toast-info{border-left:3px solid #3B82F6;}
.ux-toast-warning{border-left:3px solid #F59E0B;}
@keyframes ux-toast-in{from{opacity:0;transform:translateY(-20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

/* Loading spinner (utility class for future use) */
.ux-spinner{display:inline-block;width:20px;height:20px;border:2.5px solid rgba(0,0,0,.1);border-top-color:currentColor;border-radius:50%;animation:ux-spin .6s linear infinite;}
@keyframes ux-spin{to{transform:rotate(360deg);}}

/* Accessibility: Focus Visible */
*:focus-visible{outline:2.5px solid #3B82F6 !important;outline-offset:2px !important;}
[role="button"]:focus-visible,[tabindex]:focus-visible{outline:2.5px solid #3B82F6 !important;outline-offset:2px !important;}

/* Touch Target Enhancement - only for standalone buttons with explicit padding */
#root button{min-height:44px;}

/* iOS Momentum Scrolling */
[style*="overflow"]{-webkit-overflow-scrolling:touch;}

/* Page Transition Animation */
@keyframes ux-page-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#root>div{animation:ux-page-in .25s ease-out;}

/* Offline Banner */
.ux-offline-banner{position:fixed;top:0;left:0;right:0;z-index:9999;padding:10px 16px;background:#EF4444;color:#fff;text-align:center;font-size:13px;font-weight:700;transform:translateY(-100%);transition:transform .3s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
.ux-offline-banner.ux-show{transform:translateY(0);}
.ux-offline-banner .ux-pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#fff;animation:ux-pulse-anim 1.5s infinite;}
@keyframes ux-pulse-anim{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Fade animation (used by offline banner transition) */
@keyframes ux-fade-in{from{opacity:0;}to{opacity:1;}}

/* Tablet & Landscape */
@media (min-width:768px){
  #root>div{max-width:430px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.06);min-height:100vh;min-height:100dvh;}
  body{background:#f0ebe6;}
}
@media (min-width:1024px){
  body{display:flex;justify-content:center;align-items:flex-start;}
  #root{width:430px;}
}
@media (orientation:landscape) and (max-height:500px){
  #root>div{max-width:100%;margin:0;}
}

/* Haptic-ready button press */
@keyframes ux-btn-press{0%{transform:scale(1);}50%{transform:scale(.96);}100%{transform:scale(1);}}
.ux-haptic{animation:ux-btn-press .15s ease;}

/* Image lazy load fade-in - only for images not yet loaded */
img.ux-lazy-pending{opacity:0;transition:opacity .3s ease;}
img.ux-lazy-pending.ux-loaded{opacity:1;}

/* Improved color contrast for dim text — only in light mode */
@media (prefers-color-scheme: light) {
[style*="color: rgb(187, 187, 187)"],
[style*="color: rgb(187,187,187)"],
[style*="color:#bbb"],
[style*="color: #bbb"],
[style*="color:#bbbbbb"],
[style*="color: #bbbbbb"]{color:#888 !important;}
}

/* Dark Mode Support — JS theme (x0) handles colors; CSS only assists inputs & toasts */
@media (prefers-color-scheme: dark) {
  body.ux-dark-auto .ux-toast{background:rgba(50,50,70,.95) !important;}
}
body.ux-dark-on .ux-toast{background:rgba(50,50,70,.95) !important;}

/* Print Styles */
@media print {
  body{background:#fff !important;}
  #root>div{max-width:100% !important;box-shadow:none !important;}
  .ux-toast-container,.ux-offline-banner,[style*="position: fixed"],[style*="position:fixed"]{display:none !important;}
  #root img{break-inside:avoid;max-height:300px;}
  @page{margin:1.5cm;}
}

/* Data Backup FAB */
.ux-backup-fab{position:fixed;bottom:90px;right:16px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#FF7B9C;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(255,123,156,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,opacity .2s,left .3s ease,right .3s ease,bottom .3s ease;font-family:inherit;touch-action:none;user-select:none;-webkit-user-select:none;}
.ux-backup-fab.ux-fab-dragging{transition:none !important;opacity:.85;}
.ux-backup-fab:active:not(.ux-fab-dragging){transform:scale(.9);}
.ux-backup-menu{position:fixed;bottom:148px;right:16px;z-index:9998;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:8px 0;min-width:180px;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none;}
.ux-backup-menu.ux-show{opacity:1;transform:translateY(0);pointer-events:auto;}
.ux-backup-menu button{display:block;width:100%;padding:12px 18px;border:none;background:none;text-align:left;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#333;}
.ux-backup-menu button:hover,.ux-backup-menu button:focus{background:#FFF0F3;}
body.ux-dark-on .ux-backup-menu{background:#2a2a3e;}
body.ux-dark-on .ux-backup-menu button{color:#e0e0e0;}
body.ux-dark-on .ux-backup-menu button:hover,body.ux-dark-on .ux-backup-menu button:focus{background:#3a3a4e;}
@media (prefers-color-scheme: dark) {
  body.ux-dark-auto .ux-backup-menu{background:#2a2a3e;}
  body.ux-dark-auto .ux-backup-menu button{color:#e0e0e0;}
  body.ux-dark-auto .ux-backup-menu button:hover,body.ux-dark-auto .ux-backup-menu button:focus{background:#3a3a4e;}
}

/* Onboarding */
.ux-onboard-overlay{position:fixed;inset:0;z-index:10003;background:linear-gradient(180deg,#FFF8F5 0%,#FFE8EC 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;}
.ux-onboard-overlay.ux-show{opacity:1;pointer-events:auto;}
.ux-onboard-overlay .ux-ob-paw{font-size:72px;margin-bottom:24px;}
.ux-onboard-overlay .ux-ob-title{font-size:26px;font-weight:900;color:#333;margin-bottom:12px;line-height:1.4;}
.ux-onboard-overlay .ux-ob-sub{font-size:15px;color:#888;line-height:1.8;margin-bottom:40px;max-width:300px;}
.ux-onboard-overlay .ux-ob-start{background:#FF7B9C;color:#fff;border:none;padding:16px 48px;border-radius:18px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(255,123,156,.4);transition:transform .2s;}
.ux-onboard-overlay .ux-ob-start:active{transform:scale(.96);}
.ux-onboard-overlay .ux-ob-skip{margin-top:16px;background:none;border:none;color:#888;font-size:13px;cursor:pointer;font-family:inherit;min-height:44px;}
body.ux-dark-on .ux-onboard-overlay{background:linear-gradient(180deg,#1a1a2e 0%,#2a1a2e 100%);}
body.ux-dark-on .ux-onboard-overlay .ux-ob-title{color:#F0F0F0;}
body.ux-dark-on .ux-onboard-overlay .ux-ob-sub{color:#aaa;}
body.ux-dark-on .ux-onboard-overlay .ux-ob-skip{color:#aaa;}
body.ux-dark-on .ux-offline-banner{background:#991B1B;}
@media (prefers-color-scheme: dark) {
  body.ux-dark-auto .ux-onboard-overlay{background:linear-gradient(180deg,#1a1a2e 0%,#2a1a2e 100%);}
  body.ux-dark-auto .ux-onboard-overlay .ux-ob-title{color:#F0F0F0;}
  body.ux-dark-auto .ux-onboard-overlay .ux-ob-sub{color:#aaa;}
  body.ux-dark-auto .ux-onboard-overlay .ux-ob-skip{color:#aaa;}
  body.ux-dark-auto .ux-offline-banner{background:#991B1B;}
}


/* Multi-Dog Quick Switcher */
.ux-dog-switcher{position:fixed;top:env(safe-area-inset-top,12px);left:12px;z-index:9997;display:flex;gap:6px;align-items:center;max-width:calc(100vw - 80px);overflow-x:auto;}
.ux-dog-chip{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;background:#fff;border:2px solid #eee;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);color:#666;}
.ux-dog-chip.ux-active{border-color:#FF7B9C;background:#FFF0F3;color:#FF7B9C;}
.ux-dog-chip .ux-dc-emoji{font-size:14px;}
.ux-dog-chip-add{width:44px;height:44px;border-radius:50%;background:#f5f5f5;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:#999;font-family:inherit;transition:all .2s;}
.ux-dog-chip-add:hover{border-color:#FF7B9C;color:#FF7B9C;}
body.ux-dark-on .ux-dog-chip{background:#2a2a3e;border-color:#444;color:#aaa;}
body.ux-dark-on .ux-dog-chip.ux-active{border-color:#FF7B9C;background:#3a2a3e;color:#FF7B9C;}
body.ux-dark-on .ux-dog-chip-add{background:#3a3a4e;border-color:#555;}
@media (prefers-color-scheme: dark) {
  body.ux-dark-auto .ux-dog-chip{background:#2a2a3e;border-color:#444;color:#aaa;}
  body.ux-dark-auto .ux-dog-chip.ux-active{border-color:#FF7B9C;background:#3a2a3e;color:#FF7B9C;}
  body.ux-dark-auto .ux-dog-chip-add{background:#3a3a4e;border-color:#555;}
}

/* Dark mode: main content overrides */
body.ux-dark-on{background:#121212 !important;color:#F0F0F0 !important;}
body.ux-dark-on #root{background:#121212 !important;color:#F0F0F0 !important;}

/* Growth Summary Card */
.ux-growth-card{position:relative;margin:16px;border-radius:20px;background:linear-gradient(135deg,#FFF8F5 0%,#FFE8EC 50%,#E8F4FD 100%);padding:24px 20px;box-shadow:0 4px 20px rgba(255,123,156,.15);overflow:hidden;}
.ux-growth-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,123,156,.1);}
.ux-growth-card-title{font-size:16px;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.ux-growth-card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
.ux-growth-stat{text-align:center;padding:12px 8px;border-radius:14px;background:rgba(255,255,255,.7);}
.ux-growth-stat-value{font-size:24px;font-weight:900;color:#FF7B9C;}
.ux-growth-stat-label{font-size:11px;color:#888;margin-top:4px;}
.ux-growth-card-milestone{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.8);font-size:13px;font-weight:600;}
.ux-growth-share{margin-top:12px;text-align:center;}
.ux-growth-share button{padding:10px 24px;border-radius:14px;border:none;background:#FF7B9C;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(255,123,156,.3);}
body.ux-dark-on .ux-growth-card{background:linear-gradient(135deg,#1a1a2e 0%,#2a1a2e 50%,#1a2a3e 100%);}
body.ux-dark-on .ux-growth-stat{background:rgba(255,255,255,.08);}
body.ux-dark-on .ux-growth-stat-label{color:#aaa;}
body.ux-dark-on .ux-growth-stat-value{color:#FF9BB5;}
body.ux-dark-on .ux-growth-card-milestone{background:rgba(255,255,255,.06);}
@media (prefers-color-scheme:dark){
  body.ux-dark-auto .ux-growth-card{background:linear-gradient(135deg,#1a1a2e 0%,#2a1a2e 50%,#1a2a3e 100%);}
  body.ux-dark-auto .ux-growth-stat{background:rgba(255,255,255,.08);}
  body.ux-dark-auto .ux-growth-stat-label{color:#aaa;}
  body.ux-dark-auto .ux-growth-stat-value{color:#FF9BB5;}
  body.ux-dark-auto .ux-growth-card-milestone{background:rgba(255,255,255,.06);}
}

/* Anniversary Reminder */
.ux-anniversary-banner{position:fixed;top:env(safe-area-inset-top,12px);left:50%;transform:translateX(-50%);z-index:9999;max-width:380px;width:calc(100% - 32px);padding:16px 20px;border-radius:18px;background:linear-gradient(135deg,#FF7B9C,#FF9B6A);color:#fff;box-shadow:0 8px 24px rgba(255,123,156,.35);animation:ux-toast-in .35s cubic-bezier(.175,.885,.32,1.275);display:flex;align-items:center;gap:12px;cursor:pointer;}
.ux-anniversary-banner .ux-anniv-icon{font-size:28px;flex-shrink:0;}
.ux-anniversary-banner .ux-anniv-text{flex:1;font-size:14px;font-weight:700;line-height:1.5;}
.ux-anniversary-banner .ux-anniv-close{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:none;color:#fff;cursor:pointer;font-family:inherit;}

/* Breed Growth Curve */
.ux-breed-curve-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10001;display:flex;align-items:center;justify-content:center;animation:ux-fade-in .2s ease;padding:16px;}
.ux-breed-curve-panel{background:#fff;border-radius:20px;max-width:500px;width:100%;padding:24px 20px;max-height:85vh;overflow-y:auto;}
.ux-breed-curve-chart{position:relative;width:100%;height:200px;border-radius:12px;background:#f8f8f8;margin:16px 0;overflow:hidden;}
.ux-breed-curve-bar{position:absolute;bottom:0;border-radius:6px 6px 0 0;transition:height .3s ease;}
.ux-breed-curve-label{font-size:10px;text-align:center;color:#888;margin-top:4px;}
.ux-breed-curve-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:12px;}
.ux-breed-curve-legend span{display:flex;align-items:center;gap:4px;}
.ux-breed-curve-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
body.ux-dark-on .ux-breed-curve-panel{background:#1e1e2e;color:#e0e0e0;}
body.ux-dark-on .ux-breed-curve-chart{background:#252535;}
body.ux-dark-on .ux-breed-curve-label{color:#aaa;}
body.ux-dark-on .ux-breed-curve-legend{color:#ccc;}
@media (prefers-color-scheme:dark){
  body.ux-dark-auto .ux-breed-curve-panel{background:#1e1e2e;color:#e0e0e0;}
  body.ux-dark-auto .ux-breed-curve-chart{background:#252535;}
  body.ux-dark-auto .ux-breed-curve-label{color:#aaa;}
  body.ux-dark-auto .ux-breed-curve-legend{color:#ccc;}
}

/* Symptom Checker */
.ux-symptom-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.ux-symptom-chip{padding:10px 8px;border-radius:12px;border:2px solid #eee;background:#fff;text-align:center;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.ux-symptom-chip.ux-selected{border-color:#FF7B9C;background:#FFF0F3;color:#FF7B9C;}
body.ux-dark-on .ux-symptom-chip{background:#2a2a3e;border-color:#444;color:#ccc;}
body.ux-dark-on .ux-symptom-chip.ux-selected{border-color:#FF7B9C;background:#3a2a3e;color:#FF7B9C;}
@media (prefers-color-scheme:dark){
  body.ux-dark-auto .ux-symptom-chip{background:#2a2a3e;border-color:#444;color:#ccc;}
  body.ux-dark-auto .ux-symptom-chip.ux-selected{border-color:#FF7B9C;background:#3a2a3e;color:#FF7B9C;}
}
@media (max-width:359px){
  .ux-symptom-grid{grid-template-columns:repeat(2,1fr);}
  .ux-growth-card-stats{grid-template-columns:1fr 1fr;gap:8px;}
  .ux-growth-stat-value{font-size:20px;}
}

/* PWA Install Banner */
.ux-pwa-banner{position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:16px 20px env(safe-area-inset-bottom,16px);background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.1);animation:ux-slide-up .3s ease;display:flex;align-items:center;gap:14px;}
.ux-pwa-banner-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#FF7B9C,#FF9B6A);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.ux-pwa-banner-text{flex:1;}
.ux-pwa-banner-title{font-size:14px;font-weight:900;margin-bottom:2px;}
.ux-pwa-banner-sub{font-size:12px;color:#888;}
.ux-pwa-banner-actions{display:flex;gap:8px;flex-shrink:0;}
.ux-pwa-banner-actions button{padding:10px 16px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.ux-pwa-install-btn{background:#FF7B9C;color:#fff;}
.ux-pwa-dismiss-btn{background:#f0f0f0;color:#888;}
@keyframes ux-slide-up{from{transform:translateY(100%);}to{transform:translateY(0);}}
body.ux-dark-on .ux-pwa-banner{background:#1e1e2e;}
body.ux-dark-on .ux-pwa-banner-title{color:#F0F0F0;}
body.ux-dark-on .ux-pwa-banner-sub{color:#aaa;}
body.ux-dark-on .ux-pwa-dismiss-btn{background:#333;color:#aaa;}
@media (prefers-color-scheme:dark){
  body.ux-dark-auto .ux-pwa-banner{background:#1e1e2e;}
  body.ux-dark-auto .ux-pwa-banner-title{color:#F0F0F0;}
  body.ux-dark-auto .ux-pwa-banner-sub{color:#aaa;}
  body.ux-dark-auto .ux-pwa-dismiss-btn{background:#333;color:#aaa;}
}

拭き取ってね。目を擦っている・目が開かない・腫れている場合は角膜に傷がある可能性があるのですぐ受診を 🏥"},{k:["かゆ","掻く","皮膚","赤い","湿疹","フケ","脱毛","ハゲ"],a:"かゆみの主な原因はアレルギー（食物・環境）・ノミダニ・皮膚真菌症・アトピーです。まず掻いている部位を確認して。お腹や脇はアレルギー、耳の後ろはノミダニが多いです。掻きむしりを防ぐためエリザベスカラーも有効。広範囲・脱毛がある場合は受診を 🏥"},{k:["元気ない","元気がない","ぐったり","動かない","横になって"],a:"元気消失は多くの病気に共通するサインです。まず体温を測ってね（肛門で38.0〜39.0℃が正常、39.5℃以上は発熱）。食欲・水分摂取・排泄の状態も確認を。ぐったりして反応が鈍い場合は緊急性が高いのですぐ受診してください ⚠️🏥"},{k:["足","びっこ","引きずる","歩けない","痛そう","跛行"],a:"足を引きずる原因は、爪の割れ・肉球の傷・捻挫・骨折・関節疾患（膝蓋骨脱臼・股関節形成不全）などがあります。まず足の裏・爪・指の間を確認して。触ると痛がる部位を特定できると獣医さんの診断に役立ちます。腫れ・熱を持っている場合は早めに受診を 🏥"},{k:["耳","臭い","かく","頭を振る","耳垢"],a:"耳を痒がる・頭を振る・耳が臭い場合は外耳炎の可能性が高いです。たれ耳の犬種は特になりやすいです。耳垢が黒くて乾燥→耳ダニ、茶色くてベタベタ→細菌や酵母菌感染が多いです。綿棒は奥に押し込むリスクがあるので使わず、イヤークリーナーで洗浄して受診を 🏥"},{k:["震え","ブルブル","痙攣","けいれん"],a:"震えの原因は寒さ・緊張・痛み・低血糖・てんかん・中毒など様々です。意識がある震えは痛みやストレスの可能性、意識がない痙攣はてんかんや中毒の可能性があります。痙攣が5分以上続く場合は緊急です。発作中は体を押さえず安全な場所に移動させて、動画を撮って獣医さんに見せてね ⚠️🏥"},{k:["水","飲む","多飲","おしっこ","多尿"],a:"水をたくさん飲む（多飲多尿）は腎臓病・糖尿病・クッシング症候群・子宮蓄膿症などの初期症状の可能性があります。1日の飲水量を測ってみてね（体重1kgあたり100ml以上は多飲）。特に中高齢犬で急に増えた場合は血液検査をおすすめします 🏥"},{k:["太","肥満","ダイエット","体重"],a:"犬の肥満は関節疾患・心臓病・糖尿病のリスクを高めます。まず適正体重を確認して。肋骨を触って簡単に分かるのが理想的な体型です。フード量を10%ずつ減らし、おやつは1日のカロリーの10%以内に。急な食事制限は肝臓に負担がかかるので徐々に調整してね 🐾"},{k:["ノミ","ダニ","マダニ","虫","寄生虫","フィラリア"],a:"ノミ・ダニの予防は月1回の駆虫薬（スポットオンやチュアブル）が基本です。マダニは感染症を媒介するため、草むらの散歩後は体をチェックして。食いついたダニは無理に引っ張らず獣医さんで除去を。フィラリアは蚊が媒介するので、5〜12月は予防薬を忘れずに 🐾"},{k:["歯","歯磨き","口臭","歯石","歯茎"],a:"3歳以上の犬の80%が歯周病と言われています。毎日の歯磨きが理想ですが、難しければ歯磨きガム・デンタルジェルから始めてみて。口臭がきつい・歯茎が赤い・出血する場合は歯周病が進行している可能性があるので受診を 🦷"},{k:["ワクチン","予防接種","注射","狂犬病"],a:"狂犬病ワクチンは法律で年1回の接種が義務です。混合ワクチンは子犬期に3回、その後は1〜3年ごとが一般的。接種後は安静にし、顔が腫れる・嘔吐・ぐったりなどの副反応があればすぐ受診を 💉"},{k:["避妊","去勢","手術","不妊"],a:"避妊・去勢手術のメリットは、乳腺腫瘍・前立腺疾患・子宮蓄膿症の予防、マーキングやマウンティングの軽減などがあります。適齢は生後6ヶ月〜1歳が目安ですが、犬種によって異なるので獣医さんに相談を 🏥"},{k:["便秘","うんちが出ない","排便","いきむ"],a:"犬の便秘は水分不足・運動不足・食物繊維の不足・腸閉塞などが原因です。水分をしっかり取らせて、さつまいもやかぼちゃなど食物繊維を少し足してみて。2日以上排便がない場合は受診を 🏥"},{k:["鼻水","くしゃみ","鼻血"],a:"透明な鼻水はアレルギーや軽い風邪程度のことが多いですが、黄〜緑色は感染症の可能性があります。片方の鼻だけから出る場合は異物や腫瘍の可能性も。鼻血が出た場合は緊急なのですぐ受診を ⚠️🏥"},{k:["吠え","夜鳴き","無駄吠え","鳴く"],a:"吠えの原因は要求・警戒・不安・退屈・痛みなど様々。急に吠えるようになった場合は体の痛みの可能性も。老犬の夜鳴きは認知症のサインの場合も。改善しない場合はドッグトレーナーや獣医さんに相談を 🐕"},{k:["留守番","分離不安","ストレス"],a:"分離不安は飼い主と離れると過度に不安になる状態。留守中の破壊行動・粗相・過度な吠えが特徴。出かける前に知育トイにフードを詰めて与える、短い外出から慣らすのが効果的。重度の場合は獣医さんに相談を 🐾"},{k:["暑","熱中症","夏バテ","ハァハァ"],a:"犬は汗腺が少なく熱中症になりやすいです。特に短頭種・肥満犬・老犬はリスク大。気温28℃以上では散歩を朝晩に。ぐったり・よだれが多い場合は緊急。体を濡らして風を当てながら即受診を ⚠️🏥"},{k:["しつけ","トレーニング","噛む","甘噛み"],a:"しつけの基本は「褒めて伸ばす」正の強化です。良い行動をしたらすぐご褒美。トイレトレーニングは成功したらすぐ褒める・失敗は無反応で掃除。甘噛みは「痛い」と声を出して遊びを中断。根気よく続けてね 🐾"},{k:["フード","食事","ドッグフード","おやつ","手作り"],a:"総合栄養食の表示があるフードなら栄養バランスは問題ありません。与えてはいけない食品：チョコレート・玉ねぎ・ぶどう・キシリトール・アボカド ⚠️ 手作り食は獣医さん監修のレシピを参考に 🐾"},{k:["散歩","運動","走る"],a:"散歩は運動だけでなく社会化やストレス発散にも大切。小型犬は1日20-30分×2回、中型犬は30-40分×2回、大型犬は40-60分×2回が目安。子犬はワクチン完了後からお散歩デビュー 🐾"},{k:["老犬","シニア","高齢","介護"],a:"一般的に小型犬は10歳頃、大型犬は7歳頃からシニア期。定期健診を半年に1回に増やし、フードはシニア用に切り替えて。段差にはスロープ、滑りやすい床にはマットを 🐾"},{k:["子犬","パピー","赤ちゃん"],a:"子犬期は社会化が最も重要。3-14週齢がゴールデンタイムです。色々な人・犬・環境に慣れさせましょう。ワクチンスケジュールを守り、パピー用フードを1日3-4回に分けて 🐾"},{k:["しこり","腫瘍","できもの","イボ"],a:"しこりを見つけたら大きさ・硬さ・動くかどうかを確認して。柔らかくて動く→脂肪腫（良性）の可能性が高いですが、硬くて動かない・急に大きくなる場合は悪性の可能性も。早めに獣医さんで細胞診を受けて 🏥"},{k:["おなら","ガス","お腹が張"],a:"おならが多い原因は食事内容・早食い・腸内環境の乱れなど。早食い防止皿や乳酸菌サプリを試してみて。お腹がパンパンに張っている場合は胃拡張-捻転の可能性があり緊急です ⚠️🏥"},{k:["トイレ","粗相","おしっこ失敗","マーキング"],a:"トイレの失敗は叱らずに。成功したら大袈裟に褒めてご褒美を。急にトイレを失敗するようになった場合は膀胱炎や尿路感染などの病気の可能性も。血尿・頻尿がある場合は受診を 🏥"}],y=async()=>{if(!S.trim())return;const A=S.trim();M(""),o(E=>[...E,{r:"user",t:A}]);try{const Q=(await(await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:"犬の健康相談。犬:"+s.name+" 質問:"+A+" 3文で回答"}]})})).json()).content?.[0]?.text;if(Q)o(G=>[...G,{r:"ai",t:Q}]);else throw 0}catch{const E=x.find(Q=>Q.k.some(G=>A.includes(G)));let b=E?E.a:s.nn+"のこと心配だね。具体的な症状を教えてくれたらアドバイスできるよ！\n\n💡 例えば…\n・吐いた / 下痢 / 食欲がない\n・かゆがる / 目やに / 耳を掻く\n・足を引きずる / 元気がない / 震え\n・咳が出る / 水を多く飲む\n・歯磨き / ワクチ <body>
<div id="root"></div>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
<script>
(function(){
  'use strict';

  /* ==============================
     0. UTILITIES
     ============================== */
  function safeSetItem(key, value) {
    try { localStorage.setItem(key, value); return true; }
    catch(e) { console.warn('localStorage quota exceeded for key:', key); return false; }
  }

  // HTML escape helper (prevent XSS from user-input like dog names)
  function _escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ==============================
     0.1 BROWSER BACK / POPSTATE SAFETY
     ============================== */
  // Track cleanup handlers for active overlays (keydown listeners etc.)
  var _activeOverlayCleanups = [];

  function registerOverlayCleanup(fn) {
    _activeOverlayCleanups.push(fn);
  }

  function unregisterOverlayCleanup(fn) {
    var idx = _activeOverlayCleanups.indexOf(fn);
    if (idx > -1) _activeOverlayCleanups.splice(idx, 1);
  }

  // Close all UX-layer overlays/modals (called on popstate and pageshow)
  function closeAllUXOverlays() {
    var selectors = [
      '#wanchan-share-sheet',
      '#wanchan-notif-panel',
      '#wanchan-ai-modal',
      '.ux-breed-curve-modal',
      '.ux-onboard-overlay',
      '.ux-dog-switcher',
      '.ux-pwa-banner'
    ];
    selectors.forEach(function(sel) {
      var el = document.querySelector(sel);
      if (el) el.remove();
    });
    // Run registered cleanup callbacks (removes document-level keydown handlers etc.)
    var cleanups = _activeOverlayCleanups.slice();
    _activeOverlayCleanups = [];
    cleanups.forEach(function(fn) { try { fn(); } catch(e) {} });
  }

  // Close overlays on browser back/forward (popstate)
  window.addEventListener('popstate', function() {
    closeAllUXOverlays();
  });

  // Handle bfcache restoration (Safari/iOS swipe-back)
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      closeAllUXOverlays();
    }
  });

  // Dark mode detection helper (DRY)
  function _isDark() {
    return document.body.classList.contains('ux-dark-on') ||
      (document.body.classList.contains('ux-dark-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }

  // Close any existing overlay before opening a new one
  function closeAllOverlays() {
    var el = document.querySelector('.ux-onboard-overlay');
    if (el) { el.classList.remove('ux-show'); setTimeout(function() { el.remove(); }, 400); }
  }

  // Auto-focus first button in overlay after it opens
  function autoFocusOverlay(overlay) {
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        overlay.classList.add('ux-show');
        var btn = overlay.querySelector('button');
        if (btn) setTimeout(function() { btn.focus(); }, 100);
      });
    });
  }

  // Trap focus inside overlay (Escape to close)
  function trapFocus(overlay, onClose) {
    overlay.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { e.preventDefault(); onClose(); }
      if (e.key === 'Tab') {
        var focusable = overlay.querySelectorAll('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
        if (focusable.length === 0) return;
        var first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });
  }

  /* ==============================
     1. TOAST SYSTEM (replaces alert)
     ============================== */
  var toastContainer = document.createElement('div');
  toastContainer.className = 'ux-toast-container';
  toastContainer.setAttribute('role', 'status');
  toastContainer.setAttribute('aria-live', 'polite');
  document.body.appendChild(toastContainer);

  function showToast(msg, type) {
    type = type || 'info';
    var icons = {success:'✅', error:'❌', info:'💡', warning:'⚠️'};
    var t = document.createElement('div');
    t.className = 'ux-toast ux-toast-' + type;
    var iconSpan = document.createElement('span');
    iconSpan.className = 'ux-toast-icon';
    iconSpan.textContent = icons[type] || '💡';
    var msgSpan = document.createElement('span');
    msgSpan.textContent = msg;
    t.appendChild(iconSpan);
    t.appendChild(msgSpan);
    // Limit max concurrent toasts to prevent DOM flooding
    while (toastContainer.children.length >= 5) {
      toastContainer.firstChild.remove();
    }
    toastContainer.appendChild(t);
    setTimeout(function(){ t.classList.add('ux-toast-out'); }, 2500);
    setTimeout(function(){ t.remove(); }, 2800);
  }

  // Override native alert with toast (coerce all types to string)
  window.alert = function(msg) {
    var text = (msg === null || msg === undefined) ? '' : String(msg);
    if (!text) return;
    var type = 'info';
    if (text.indexOf('送信') !== -1 || text.indexOf('完了') !== -1 || text.indexOf('成功') !== -1) type = 'success';
    else if (text.indexOf('エラー') !== -1 || text.indexOf('失敗') !== -1) type = 'error';
    else if (text.indexOf('許可') !== -1 || text.indexOf('注意') !== -1) type = 'warning';
    showToast(text, type);
  };

  // Single namespace for React integration
  window.__wanchan = window.__wanchan || {};
  window.__wanchan.showToast = showToast;

  /* ==============================
     2. ENHANCED DELETE CONFIRMATION
     ============================== */
  // The app uses a custom `.ask()` pattern for deletions.
  // We don't override window.confirm to avoid breaking synchronous return values.

  /* ==============================
     3. ACCESSIBILITY ENHANCEMENTS
     ============================== */
  function enhanceAccessibility() {
    // Add role="button" to clickable divs (for screen readers)
    // Only add tabindex to prominent standalone buttons, not every clickable element
    var clickables = document.querySelectorAll('#root div[style*="cursor"]');
    clickables.forEach(function(el) {
      if (el.style.cursor === 'pointer' && !el.getAttribute('role') && el.tagName !== 'BUTTON' && el.tagName !== 'A') {
        el.setAttribute('role', 'button');
        // Only add tabindex to elements with significant padding (standalone buttons)
        // Skip small inline text links, icon pickers, etc.
        var h = el.offsetHeight;
        if (h >= 40 && !el.getAttribute('tabindex')) {
          el.setAttribute('tabindex', '0');
          if (!el._uxKeyHandler) {
            el._uxKeyHandler = true;
            el.addEventListener('keydown', function(e) {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                el.click();
              }
            });
          }
        }
      }
    });

    // Add aria-labels to icon-only buttons
    var emojiButtons = document.querySelectorAll('#root div[role="button"]');
    emojiButtons.forEach(function(el) {
      if (!el.getAttribute('aria-label')) {
        var text = el.textContent.trim();
        if (text.length <= 3) {
          var labels = {'✏️':'日記を書く','❤️':'いいね','🗑':'削除','⚙️':'設定','✕':'閉じる','←':'戻る','📷':'写真','🖨':'印刷'};
          if (labels[text]) el.setAttribute('aria-label', labels[text]);
        }
      }
    });

    // Add nav role to bottom tab bar only
    // Identify by: fixed position + bottom:0 + has multiple clickable children (tab items)
    var fixedEls = document.querySelectorAll('#root div[style*="position: fixed"], #root div[style*="position:fixed"]');
    fixedEls.forEach(function(el) {
      if (el.getAttribute('role')) return;
      // Must have bottom: 0 (the actual bottom positioning, not padding-bottom etc.)
      if (el.style.bottom !== '0px' && el.style.bottom !== '0') return;
      // Must have multiple clickable children (tab bar pattern)
      var clickableKids = el.querySelectorAll('[style*="cursor"]');
      if (clickableKids.length >= 3) {
        el.setAttribute('role', 'navigation');
        el.setAttribute('aria-label', 'メインナビゲーション');
      }
    });

    // Note: #root wraps the entire app (nav, content, etc.) so no landmark role is set.

    // Enhance img alt text
    document.querySelectorAll('#root img:not([alt])').forEach(function(img) {
      img.setAttribute('alt', 'わんちゃんの写真');
    });
  }

  /* ==============================
     4. HAPTIC FEEDBACK
     ============================== */
  function triggerHaptic(type) {
    if (navigator.vibrate) {
      if (type === 'light') navigator.vibrate(10);
      else if (type === 'medium') navigator.vibrate(20);
      else if (type === 'heavy') navigator.vibrate([10, 30, 10]);
    }
  }

  document.addEventListener('click', function(e) {
    var target = e.target.closest('[role="button"], button, [style*="cursor: pointer"], [style*="cursor:pointer"]');
    if (target && target.closest('#root')) {
      triggerHaptic('light');
      // Add press animation
      target.classList.add('ux-haptic');
      setTimeout(function(){ target.classList.remove('ux-haptic'); }, 150);
    }
  }, true);

  /* ==============================
     5. OFFLINE DETECTION UI
     ============================== */
  var offlineBanner = document.createElement('div');
  offlineBanner.className = 'ux-offline-banner';
  offlineBanner.setAttribute('role', 'alert');
  var pulseSpan = document.createElement('span');
  pulseSpan.className = 'ux-pulse';
  offlineBanner.appendChild(pulseSpan);
  offlineBanner.appendChild(document.createTextNode(' インターネットに接続していません — 記録はスマートフォンに安全に保存されています'));
  document.body.appendChild(offlineBanner);

  function updateOnlineStatus() {
    if (navigator.onLine) {
      offlineBanner.classList.remove('ux-show');
    } else {
      offlineBanner.classList.add('ux-show');
    }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  /* ==============================
     6. IMAGE LAZY LOADING
     ============================== */
  function enableLazyLoading() {
    document.querySelectorAll('#root img:not([data-ux-lazy])').forEach(function(img) {
      img.setAttribute('data-ux-lazy', '1');
      // Don't lazy-load small icons/avatars (under 60px)
      var w = img.getAttribute('width') || img.style.width;
      if (w && parseInt(w) < 60) return;
      if (img.closest('[style*="position: fixed"]') || img.closest('[style*="position:fixed"]')) return;

      img.setAttribute('loading', 'lazy');
      // Only apply fade-in for images not yet loaded
      if (img.complete && img.naturalWidth > 0) {
        // Already loaded, don't hide it
        return;
      }
      img.classList.add('ux-lazy-pending');
      img.addEventListener('load', function() {
        img.classList.add('ux-loaded');
      }, {once: true});
      // Fallback: show after 3s to prevent permanently hidden images
      setTimeout(function(){ img.classList.add('ux-loaded'); }, 3000);
    });
  }

  /* ==============================
     7. FORM AUTO-SAVE (Draft)
     ============================== */
  var autoSaveTimers = {};
  function enableAutoSave() {
    document.querySelectorAll('#root textarea').forEach(function(ta) {
      if (ta._uxAutoSave) return;
      ta._uxAutoSave = true;
      // Use placeholder + DOM path to create unique key per textarea
      var path = [];
      var node = ta;
      while (node && node !== document.body) {
        var idx = 0;
        var sib = node.previousElementSibling;
        while (sib) { idx++; sib = sib.previousElementSibling; }
        path.unshift(idx);
        node = node.parentNode;
      }
      var key = 'ux_draft_' + path.join('.') + '_' + (ta.placeholder || '');

      // Restore draft - show as placeholder hint, user copies on click
      var draft = localStorage.getItem(key);
      if (draft && !ta.value) {
        ta.setAttribute('placeholder', draft.substring(0, 60) + (draft.length > 60 ? '...' : ''));
        var hint = document.createElement('div');
        hint.textContent = '📝 下書きあり（タップで復元）';
        hint.style.cssText = 'font-size:12px;color:#F59E0B;padding:4px 0;cursor:pointer;font-weight:600;';
        hint.addEventListener('click', function() {
          try {
            // Use native setter + input event for React 19 compatibility
            var nativeSet = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
            nativeSet.call(ta, draft);
            ta.dispatchEvent(new Event('input', { bubbles: true }));
          } catch(e) {
            ta.value = draft;
          }
          ta.focus();
          hint.remove();
          showToast('前に書いた内容が戻りました', 'success');
        }, {once: true});
        if (ta.parentNode) ta.parentNode.insertBefore(hint, ta.nextSibling);
      }

      ta.addEventListener('input', function() {
        clearTimeout(autoSaveTimers[key]);
        autoSaveTimers[key] = setTimeout(function() {
          if (ta.value.trim()) {
            safeSetItem(key, ta.value);
          } else {
            localStorage.removeItem(key);
          }
        }, 2000);
      });
    });
  }

  // Clear draft after successful form submission
  // Instead of guessing success, clear when the textarea is removed from DOM (page navigated away)
  // or when its value becomes empty after a save action
  // Clear drafts after save: poll until textarea is gone/empty (max 5s, no premature deletion)
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('[style*="cursor"]') || e.target;
    if (!btn) return;
    var text = btn.textContent.trim();
    if (text === '保存' || text === '記録する' || text === '送信') {
      var attempts = 0;
      var checkInterval = setInterval(function() {
        attempts++;
        var textareas = document.querySelectorAll('#root textarea');
        var hasNonEmpty = false;
        textareas.forEach(function(ta) { if (ta.value.trim()) hasNonEmpty = true; });
        if (!hasNonEmpty || textareas.length === 0 || attempts >= 10) {
          clearInterval(checkInterval);
          if (!hasNonEmpty || textareas.length === 0) {
            Object.keys(localStorage).forEach(function(k) {
              if (k.startsWith('ux_draft_')) localStorage.removeItem(k);
            });
          }
        }
      }, 500);
    }
  });

  /* ==============================
     9. SCROLL IMPROVEMENTS
     ============================== */
  // Add momentum scrolling to overflow containers
  function enhanceScrolling() {
    document.querySelectorAll('#root [style*="overflow"]').forEach(function(el) {

    }

  });

  function startObserving() {

  (function() {

      var activeNav = document.querySelector('[data-page].active, nav [style*="color: rgb(255, 123, 156)"], nav [style*="#FF7B9C"]');
      if (!activeNav) return '';
      return activeNav.getAttribute('data-page') || activeNav.textContent.trim() || '';
    }

    // Sync React navigation with History API
    var screenObserver = new MutationObserver(function() {
      if (_popInProgress) return;
      var screen = detectCurrentScreen();
      if (screen && screen !== _lastScreen) {
        if (_lastScreen === '') {
          window.history.replaceState({ screen: screen }, '');
        } else {
          window.history.pushState({ screen: screen }, '');
        }
        _lastScreen = screen;
      }
    });

    // Observe root for navigation changes
    function startScreenObserver() {
      var root = document.getElementById('root');
      if (root) {
        screenObserver.observe(root, { childList: true, subtree: true });
      } else {
        setTimeout(startScreenObserver, 500);
      }
    }

        window.dispatchEvent(new StorageEvent('storage', { key: 'wc2', newValue: JSON.stringify(appState) }));

  // --- FAB Drag Logic ---
  (function() {
    var fab = backupFab;
    var dragging = false;
    var dragMoved = false;
    var startX = 0, startY = 0;
    var fabStartLeft = 0, fabStartTop = 0;
    var DRAG_THRESHOLD = 8;
    var FAB_SIZE = 48;
    var EDGE_MARGIN = 16;

    // Restore saved position
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem('ux_fab_pos')); } catch(e) {}
    if (saved && typeof saved.bottom === 'number' && typeof saved.right === 'number') {
      fab.style.bottom = saved.bottom + 'px';
      fab.style.right = saved.right + 'px';
      if (typeof saved.side === 'string' && saved.side === 'left') {
        fab.style.right = 'auto';
        fab.style.left = saved.left + 'px';
      }
    }

    function getPointerPos(e) {
      if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function getSafeArea() {
      var s = getComputedStyle(document.documentElement);
      return {
        top: parseInt(s.getPropertyValue('env(safe-area-inset-top)')) || 0,
        bottom: parseInt(s.getPropertyValue('env(safe-area-inset-bottom)')) || 0,
        left: parseInt(s.getPropertyValue('env(safe-area-inset-left)')) || 0,
        right: parseInt(s.getPropertyValue('env(safe-area-inset-right)')) || 0
      };
    }

    function onStart(e) {
      if (e.button && e.button !== 0) return;
      var pos = getPointerPos(e);
      startX = pos.x;
      startY = pos.y;
      var rect = fab.getBoundingClientRect();
      fabStartLeft = rect.left;
      fabStartTop = rect.top;
      dragging = true;
      dragMoved = false;
      fab.classList.add('ux-fab-dragging');
      // Switch to left/top positioning for dragging
      fab.style.left = rect.left + 'px';
      fab.style.top = rect.top + 'px';
      fab.style.right = 'auto';
      fab.style.bottom = 'auto';
    }

    function onMove(e) {
      if (!dragging) return;
      var pos = getPointerPos(e);
      var dx = pos.x - startX;
      var dy = pos.y - startY;
      if (!dragMoved && Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
      dragMoved = true;
      e.preventDefault();

      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var safe = getSafeArea();
      var newLeft = fabStartLeft + dx;
      var newTop = fabStartTop + dy;

      // Constrain to viewport
      newLeft = Math.max(EDGE_MARGIN + safe.left, Math.min(newLeft, vw - FAB_SIZE - EDGE_MARGIN - safe.right));
      newTop = Math.max(EDGE_MARGIN + safe.top, Math.min(newTop, vh - FAB_SIZE - EDGE_MARGIN - safe.bottom));

      fab.style.left = newLeft + 'px';
      fab.style.top = newTop + 'px';
    }

    function onEnd(e) {
      if (!dragging) return;
      dragging = false;
      fab.classList.remove('ux-fab-dragging');

      if (!dragMoved) {
        // Restore to right/bottom positioning (was just a tap)
        var rect = fab.getBoundingClientRect();
        fab.style.left = '';
        fab.style.top = '';
        fab.style.right = (window.innerWidth - rect.right) + 'px';
        fab.style.bottom = (window.innerHeight - rect.bottom) + 'px';
        return;
      }

      // Snap to nearest horizontal edge
      var rect = fab.getBoundingClientRect();
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var safe = getSafeArea();
      var centerX = rect.left + FAB_SIZE / 2;
      var bottomVal = vh - rect.bottom;

      fab.style.top = '';
      fab.style.bottom = Math.max(EDGE_MARGIN + safe.bottom, bottomVal) + 'px';

      if (centerX < vw / 2) {
        // Snap left
        fab.style.left = (EDGE_MARGIN + safe.left) + 'px';
        fab.style.right = 'auto';
        saveFabPos('left');
      } else {
        // Snap right
        fab.style.left = '';
        fab.style.right = (EDGE_MARGIN + safe.right) + 'px';
        saveFabPos('right');
      }
    }

    function saveFabPos(side) {
      var rect = fab.getBoundingClientRect();
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var data = {
        side: side,
        bottom: vh - rect.bottom,
        right: vw - rect.right,
        left: rect.left
      };
      try { localStorage.setItem('ux_fab_pos', JSON.stringify(data)); } catch(e) {}
    }

    // Expose dragMoved for click handler
    fab._isDragMove = function() { return dragMoved; };

    // Expose position update for menu
    fab._getMenuPosition = function() {
      var rect = fab.getBoundingClientRect();
      var vw = window.innerWidth;
      var side = (rect.left + FAB_SIZE / 2 < vw / 2) ? 'left' : 'right';
      return { side: side, rect: rect };
    };

    // Touch events
    fab.addEventListener('touchstart', onStart, { passive: true });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
    // Mouse events
    fab.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
  })();

  function navigateToAddDog() {

    // Find the fixed-bottom nav container, then locate the tab containing "メニュー" or "☰".
    var navContainer = document.querySelector('[role="navigation"]');

        if (d.style.position === 'fixed' && (d.style.bottom === '0px' || d.style.bottom === '0')) {
          var kids = d.querySelectorAll('[style*="cursor"]');
          if (kids.length >= 3) navContainer = d;
        }
      });
    }
    if (navContainer) {
      var tabs = navContainer.querySelectorAll('[style*="cursor"]');
      var menuTab = null;
      tabs.forEach(function(tab) {
        var text = tab.textContent || '';

        // After navigating to menu, find and click "設定" or "うちの子を追加"
        setTimeout(function() {
          var menuItems = document.querySelectorAll('#root [style*="cursor"]');
          var settingsItem = null;
          menuItems.forEach(function(item) {
            var text = item.textContent || '';
            if (text.includes('うちの子を追加') || (text.includes('設定') && text.includes('テーマ'))) {

  var _dogProfileCache = null;
  var _dogProfileCacheKey = '';

  function getDogProfiles() {
    // Build a cheap cache key from localStorage key count + total length
    var cacheKey = localStorage.length + ':';
    for (var j = 0; j < localStorage.length; j++) {
      var k = localStorage.key(j);
      if (k && !k.startsWith('ux_')) cacheKey += k + ',';
    }
    if (cacheKey === _dogProfileCacheKey && _dogProfileCache) return _dogProfileCache;

    var dogs = [];
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (key && key.startsWith('ux_')) continue;
      try {
        var val = localStorage.getItem(key);
        var parsed = JSON.parse(val);
        if (Array.isArray(parsed)) {
          parsed.forEach(function(item) {
            if (item && typeof item === 'object' && item.name && (item.breed || item.birthday || item.weight !== undefined)) {
              dogs.push({
                id: item.id || item.name,
                name: item.name,
                breed: item.breed || '',
                emoji: item.icon || '🐶',
                storageKey: key
              });
            }
          });
        }
      } catch(e) { console.warn('getDogProfiles: skipped key', key, e); }
    }
    _dogProfileCache = dogs;
    _dogProfileCacheKey = cacheKey;
    return dogs;
  }

  function shareToSNS(platform, text, url) {
    url = url || window.location.href;

    var shareUrl = '';
    switch (platform) {
      case 'x':
        shareUrl = 'https://x.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url);
        break;
      case 'line':
        shareUrl = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text);
        break;
      case 'copy':
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() {
            showToast('リンクをコピーしました', 'success');
          }).catch(function() {
            showToast('コピーがうまくいきませんでした。もう一度試してみてね', 'error');
          });

          try { var ta = document.createElement('textarea'); ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('リンクをコピーしました', 'success'); } catch(_) { showToast('コピーがうまくいきませんでした。もう一度試してみてね', 'error'); }
        }

        var a = window.__wanchan && window.__wanchan.analytics;

  function getGrowthData() {
    try {
      var data = JSON.parse(localStorage.getItem('wc2') || '{}');
      var diaries = data.diaries || [];
      var weights = data.weights || [];
      var name = data.name || 'わんちゃん';
      var birthday = data.birthday || '';
      var breed = data.breed || '';

      // Calculate age
      var ageText = '';
      var ageDays = 0;
      if (birthday) {
        var bDate = new Date(birthday);
        if (isNaN(bDate.getTime())) return null; // Invalid date guard
        var now = new Date();
        ageDays = Math.floor((now - bDate) / (1000 * 60 * 60 * 24));
        var years = Math.floor(ageDays / 365);
        var months = Math.floor((ageDays % 365) / 30);
        if (years > 0) {
          ageText = years + '歳' + (months > 0 ? months + 'ヶ月' : '');
        } else if (months > 0) {
          ageText = months + 'ヶ月';
        } else {
          ageText = ageDays + '日';
        }
      }

      // Weight change
      var latestWeight = weights.length > 0 ? weights[weights.length - 1] : null;
      var firstWeight = weights.length > 1 ? weights[0] : null;
      var weightChange = '';
      if (latestWeight && firstWeight) {
        var lw = parseFloat(latestWeight.weight || latestWeight.w || 0);
        var fw = parseFloat(firstWeight.weight || firstWeight.w || 0);
        var diff = lw - fw;
        weightChange = (diff >= 0 ? '+' : '') + diff.toFixed(1) + 'kg';
      }

      // Milestone detection
      var milestone = '';
      if (ageDays === 0) milestone = '🎉 今日が記念すべき初日！';
      else if (ageDays === 100) milestone = '🎊 100日おめでとう！';
      else if (ageDays === 365) milestone = '🎂 1歳のお誕生日！';
      else if (ageDays === 730) milestone = '🎂 2歳のお誕生日！';
      else if (ageDays === 1095) milestone = '🎂 3歳のお誕生日！';
      else if (diaries.length === 1) milestone = '📝 はじめての日記！';
      else if (diaries.length === 10) milestone = '📝 日記10回達成！';
      else if (diaries.length === 50) milestone = '📝 日記50回達成！';
      else if (diaries.length === 100) milestone = '🏆 日記100回達成！';

      return {
        name: name,
        breed: breed,
        ageText: ageText,
        ageDays: ageDays,
        diaryCount: diaries.length,
        weightCount: weights.length,
        latestWeight: latestWeight ? parseFloat(latestWeight.weight || latestWeight.w || 0).toFixed(1) : '-',
        weightChange: weightChange,
        milestone: milestone
      };
    } catch (e) {
      return null;
    }
  }

    if (an && an.logEvent) an.logEvent('growth_card_view', { diary_count: data.diaryCount });
  }

  // Render after React loads
  setTimeout(renderGrowthCard, 1500);
  window.addEventListener('storage', function(e) {
    if (e.key === 'wc2') setTimeout(renderGrowthCard, 500);
  });

  /* ==============================
     21. ANNIVERSARY REMINDER (記念日リマインダー) - Feature C
     ============================== */
  function checkAnniversary() {
    try {
      var data = JSON.parse(localStorage.getItem('wc2') || '{}');
      if (!data.birthday) return;

      var birthday = new Date(data.birthday);
      if (isNaN(birthday.getTime())) return; // Invalid date guard
      var now = new Date();
      var dogName = _escHtml(data.name || 'わんちゃん');
      var todayStr = (now.getMonth() + 1) + '-' + now.getDate();
      var bdayStr = (birthday.getMonth() + 1) + '-' + birthday.getDate();

      // Check if today is birthday
      if (todayStr === bdayStr) {
        var years = now.getFullYear() - birthday.getFullYear();
        showAnniversaryBanner('🎂', dogName + 'の' + years + '歳のお誕生日おめでとう！');
        return;
      }

      // Check milestone days
      var ageDays = Math.floor((now - birthday) / (1000 * 60 * 60 * 24));
      var milestones = {
        7: '1週間',
        30: '1ヶ月',
        100: '100日',
        200: '200日',
        365: '1年',
        500: '500日',
        730: '2年',
        1000: '1000日',
        1095: '3年'
      };

      if (milestones[ageDays]) {
        showAnniversaryBanner('🎉', dogName + 'と出会って' + milestones[ageDays] + '記念日！');
        return;
      }

      // Birthday approaching (3 days before)
      var nextBirthday = new Date(now.getFullYear(), birthday.getMonth(), birthday.getDate());
      if (nextBirthday < now) nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
      var daysUntilBday = Math.ceil((nextBirthday - now) / (1000 * 60 * 60 * 24));
      if (daysUntilBday > 0 && daysUntilBday <= 3) {
        showAnniversaryBanner('🎁', dogName + 'のお誕生日まであと' + daysUntilBday + '日！');
      }
    } catch (e) {}
  }

  function showAnniversaryBanner(icon, text) {
    var dismissed = localStorage.getItem('ux_anniv_dismissed');
    var today = new Date().toISOString().slice(0, 10);
    if (dismissed === today) return;

    var banner = document.createElement('div');
    banner.className = 'ux-anniversary-banner';
    banner.setAttribute('role', 'alert');
    banner.setAttribute('aria-live', 'polite');
    var iconEl = document.createElement('div');
    iconEl.className = 'ux-anniv-icon';
    iconEl.textContent = icon;
    var textEl = document.createElement('div');
    textEl.className = 'ux-anniv-text';
    textEl.textContent = text;
    var closeBtn = document.createElement('button');
    closeBtn.className = 'ux-anniv-close';
    closeBtn.setAttribute('aria-label', '閉じる');
    closeBtn.textContent = '\u2715';
    banner.appendChild(iconEl);
    banner.appendChild(textEl);
    banner.appendChild(closeBtn);

    document.body.appendChild(banner);

    banner.querySelector('.ux-anniv-close').addEventListener('click', function(e) {
      e.stopPropagation();
      safeSetItem('ux_anniv_dismissed', today);
      banner.style.opacity = '0';
      banner.style.transform = 'translateX(-50%) translateY(-20px)';
      setTimeout(function() { banner.remove(); }, 300);
    });

    // Auto-dismiss after 8s
    setTimeout(function() {
      if (banner.parentNode) {
        banner.style.opacity = '0';
        banner.style.transform = 'translateX(-50%) translateY(-20px)';
        setTimeout(function() { banner.remove(); }, 300);
      }
    }, 8000);

    // Track
    var an = window.__wanchan && window.__wanchan.analytics;
    if (an && an.logEvent) an.logEvent('anniversary_shown', { text: text });
  }

  setTimeout(checkAnniversary, 2000);

  /* ==============================
     22. BREED GROWTH CURVE (犬種別成長曲線) - Feature B
     ============================== */
  var BREED_CURVES = {
    'チワワ':        { m: [0.2, 0.4, 0.8, 1.2, 1.6, 1.9, 2.1, 2.3, 2.4, 2.5, 2.6, 2.7], max: 3.5 },
    'トイプードル':  { m: [0.3, 0.8, 1.5, 2.2, 2.8, 3.2, 3.5, 3.7, 3.8, 3.9, 4.0, 4.0], max: 5 },
    'ミニチュアダックスフンド': { m: [0.4, 0.9, 1.6, 2.4, 3.0, 3.5, 3.9, 4.2, 4.4, 4.5, 4.6, 4.8], max: 6 },
    'ポメラニアン':  { m: [0.2, 0.5, 1.0, 1.5, 1.9, 2.2, 2.5, 2.7, 2.8, 2.9, 3.0, 3.1], max: 4 },
    '柴犬':          { m: [0.5, 1.5, 3.0, 4.5, 5.5, 6.5, 7.5, 8.0, 8.5, 9.0, 9.5, 10.0], max: 13 },
    'フレンチブルドッグ': { m: [0.5, 1.5, 3.0, 4.5, 6.0, 7.5, 8.5, 9.5, 10.0, 10.5, 11.0, 11.5], max: 14 },
    'ゴールデンレトリバー': { m: [1.0, 3.0, 6.0, 10.0, 14.0, 18.0, 22.0, 25.0, 27.0, 29.0, 30.0, 31.0], max: 36 },
    'ラブラドールレトリバー': { m: [1.0, 3.0, 6.5, 10.5, 15.0, 19.0, 23.0, 26.0, 28.0, 30.0, 31.0, 32.0], max: 36 },
    'ヨークシャーテリア': { m: [0.2, 0.4, 0.7, 1.0, 1.3, 1.6, 1.8, 2.0, 2.2, 2.3, 2.4, 2.5], max: 3.5 },
    'シーズー':      { m: [0.3, 0.7, 1.3, 2.0, 2.8, 3.5, 4.0, 4.5, 5.0, 5.5, 6.0, 6.5], max: 8 },
    'パグ':          { m: [0.3, 0.8, 1.5, 2.5, 3.5, 4.5, 5.0, 5.5, 6.0, 6.5, 6.8, 7.0], max: 9 },
    'マルチーズ':    { m: [0.2, 0.4, 0.8, 1.2, 1.6, 1.9, 2.1, 2.3, 2.5, 2.7, 2.8, 3.0], max: 4 },
    'ミニチュアシュナウザー': { m: [0.3, 0.8, 1.5, 2.5, 3.5, 4.5, 5.0, 5.5, 6.0, 6.5, 7.0, 7.5], max: 9 }
  };

  function showBreedCurveModal() {
    var existing = document.querySelector('.ux-breed-curve-modal');
    if (existing) existing.remove();

    var isDark = document.body.classList.contains('ux-dark-on') ||
      (document.body.classList.contains('ux-dark-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);

    var data;
    try { data = JSON.parse(localStorage.getItem('wc2') || '{}'); } catch(e) { data = {}; }
    var breed = data.breed || '';
    var weights = data.weights || [];
    var birthday = data.birthday || '';
    var name = data.name || 'わんちゃん';

    var overlay = document.createElement('div');
    overlay.className = 'ux-breed-curve-modal';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-label', name + 'の成長曲線');

    var panel = document.createElement('div');
    panel.className = 'ux-breed-curve-panel';

    var safeName = _escHtml(name);
    var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">';
    html += '<div style="font-size:18px;font-weight:900;">📈 ' + safeName + 'の成長曲線</div>';
    html += '<button id="breed-curve-close" aria-label="閉じる" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:' + (isDark ? '#333' : '#f0f0f0') + ';cursor:pointer;font-size:14px;border:none;font-family:inherit;">✕</button>';
    html += '</div>';

    // Breed selector
    html += '<div style="margin-bottom:12px;"><select id="breed-curve-select" style="width:100%;padding:10px 14px;border-radius:12px;border:2px solid ' + (isDark ? '#444' : '#eee') + ';font-size:14px;font-family:inherit;background:' + (isDark ? '#252535' : '#fff') + ';color:' + (isDark ? '#e0e0e0' : '#333') + ';">';
    html += '<option value="">犬種を選んでね</option>';
    Object.keys(BREED_CURVES).forEach(function(b) {
      html += '<option value="' + b + '"' + (b === breed ? ' selected' : '') + '>' + b + '</option>';
    });
    html += '</select></div>';

    // Chart area
    html += '<div id="breed-curve-chart" class="ux-breed-curve-chart"></div>';
    html += '<div class="ux-breed-curve-legend">';
    html += '<span><span class="dot" style="background:#FF7B9C;"></span> ' + safeName + 'の体重</span>';
    html += '<span><span class="dot" style="background:rgba(59,130,246,.5);"></span> 犬種平均</span>';
    html += '</div>';

    // Status message
    html += '<div id="breed-curve-status" style="margin-top:12px;padding:12px;border-radius:12px;background:' + (isDark ? '#1a2a1a' : '#F0FFF4') + ';font-size:13px;color:' + (isDark ? '#a7f3d0' : '#166534') + ';line-height:1.6;display:none;"></div>';

    panel.innerHTML = html;
    overlay.appendChild(panel);
    document.body.appendChild(overlay);

    function closeCurveModal() {
      overlay.remove();
      document.removeEventListener('keydown', curveEscHandler);
      unregisterOverlayCleanup(curveCleanup);
    }
    function curveEscHandler(e) { if (e.key === 'Escape') closeCurveModal(); }
    function curveCleanup() { document.removeEventListener('keydown', curveEscHandler); }
    registerOverlayCleanup(curveCleanup);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeCurveModal(); });
    document.getElementById('breed-curve-close').addEventListener('click', closeCurveModal);
    document.addEventListener('keydown', curveEscHandler);

    function renderChart(selectedBreed) {
      var chart = document.getElementById('breed-curve-chart');
      var status = document.getElementById('breed-curve-status');
      if (!chart) return;
      chart.innerHTML = '';

      var curve = BREED_CURVES[selectedBreed];
      if (!curve) {
        chart.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:14px;">犬種を選ぶと成長の目安がわかるよ</div>';
        if (status) status.style.display = 'none';
        return;
      }

      var maxW = curve.max;
      var months = curve.m;
      var barWidth = Math.floor((chart.offsetWidth - 24) / 12) - 4;
      if (barWidth < 16) barWidth = 16;

      // Get user's weights mapped to months
      var userWeightsByMonth = {};
      if (birthday && weights.length > 0) {
        var bDate = new Date(birthday);
        if (!isNaN(bDate.getTime())) weights.forEach(function(w) {
          var wDate = new Date(w.date || w.d);
          if (isNaN(wDate.getTime())) return;
          var monthAge = Math.round((wDate - bDate) / (1000 * 60 * 60 * 24 * 30));
          if (monthAge >= 0 && monthAge < 12) {
            userWeightsByMonth[monthAge] = parseFloat(w.weight || w.w || 0);
          }
        });
      }

      for (var i = 0; i < 12; i++) {
        var x = 12 + i * (barWidth + 4);

        // Breed average bar
        var avgH = (months[i] / maxW) * 170;
        var avgBar = document.createElement('div');
        avgBar.className = 'ux-breed-curve-bar';
        avgBar.style.cssText = 'left:' + x + 'px;width:' + (barWidth / 2 - 1) + 'px;height:' + avgH + 'px;background:rgba(59,130,246,.3);';
        chart.appendChild(avgBar);

        // User weight bar
        if (userWeightsByMonth[i] !== undefined) {
          var userH = (userWeightsByMonth[i] / maxW) * 170;
          var userBar = document.createElement('div');
          userBar.className = 'ux-breed-curve-bar';
          userBar.style.cssText = 'left:' + (x + barWidth / 2 + 1) + 'px;width:' + (barWidth / 2 - 1) + 'px;height:' + Math.min(userH, 170) + 'px;background:#FF7B9C;';
          chart.appendChild(userBar);
        }

        // Month label
        var label = document.createElement('div');
        label.className = 'ux-breed-curve-label';
        label.style.cssText = 'position:absolute;bottom:-18px;left:' + x + 'px;width:' + barWidth + 'px;';
        label.textContent = (i + 1) + 'M';
        chart.appendChild(label);
      }

      chart.style.height = '220px';

      // Status message
      if (status) {
        var lastUserMonth = -1;
        var lastUserWeight = 0;
        Object.keys(userWeightsByMonth).forEach(function(m) {
          var mi = parseInt(m);
          if (mi > lastUserMonth) { lastUserMonth = mi; lastUserWeight = userWeightsByMonth[mi]; }
        });

        if (lastUserMonth >= 0 && lastUserMonth < 12) {
          var expected = months[lastUserMonth];
          if (expected <= 0) { status.style.display = 'none'; return; } // zero division guard
          var pct = ((lastUserWeight / expected) * 100).toFixed(0);
          var msg = '';
          if (pct >= 90 && pct <= 110) {
            msg = '✅ ' + safeName + 'は犬種平均とほぼ同じペースで育っているよ（' + pct + '%）。順調だね！';
          } else if (pct > 110) {
            msg = '📈 ' + safeName + 'は犬種平均よりちょっと大きめ（' + pct + '%）だよ。フードの量を見直してみてね。';
          } else {
            msg = '📉 ' + safeName + 'は犬種平均よりちょっと小さめ（' + pct + '%）だよ。気になったら獣医さんに相談してみてね。';
          }
          status.textContent = msg;
          status.style.display = 'block';
        } else {
          status.style.display = 'none';
        }
      }
    }

    var select = document.getElementById('breed-curve-select');
    if (select) {
      select.addEventListener('change', function() { renderChart(select.value); });
      if (breed && BREED_CURVES[breed]) {
        renderChart(breed);
      } else {
        renderChart('');
      }
    }

    // Track
    var an = window.__wanchan && window.__wanchan.analytics;
    if (an && an.logEvent) an.logEvent('breed_curve_view', { breed: breed });
  }

  // Add breed curve button to menu
  var btnBreedCurve = document.createElement('button');
  btnBreedCurve.textContent = '📈 成長曲線';
  btnBreedCurve.addEventListener('click', function() {
    backupMenu.classList.remove('ux-show');
    showBreedCurveModal();
  });
  backupMenu.insertBefore(btnBreedCurve, btnAI);

  window.__wanchan.showBreedCurve = showBreedCurveModal;

  /* ==============================
     23. SYMPTOM × AI ENHANCEMENT (症状×AI強化) - Feature D
     ============================== */
  var SYMPTOM_LIST = [
    { icon: '🤮', label: '嘔吐' },
    { icon: '💩', label: '下痢' },
    { icon: '😴', label: '元気がない' },
    { icon: '🍽️', label: '食欲不振' },
    { icon: '🤧', label: 'くしゃみ・鼻水' },
    { icon: '👀', label: '目の異常' },
    { icon: '🦶', label: '足を引きずる' },
    { icon: '🐾', label: '皮膚の異常' },
    { icon: '💧', label: '水を飲みすぎる' }
  ];

  // Override AI consultation to add symptom chips
  var _origShowConsultation = null;
  var _aiReadyCheck = setInterval(function() {
    var ai = window.__wanchan && window.__wanchan.ai;
    if (ai && ai.showConsultation && !_origShowConsultation) {
      _origShowConsultation = ai.showConsultation;
      ai.showConsultation = function() {
        _origShowConsultation();
        // Wait for modal to appear, then inject symptom chips
        setTimeout(function() {
          var modal = document.getElementById('wanchan-ai-modal');
          if (!modal) return;
          var textarea = modal.querySelector('textarea');
          if (!textarea || textarea.parentNode.querySelector('.ux-symptom-grid')) return;

          var isDark = document.body.classList.contains('ux-dark-on') ||
            (document.body.classList.contains('ux-dark-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);

          var label = document.createElement('div');
          label.style.cssText = 'font-size:12px;color:' + (isDark ? '#aaa' : '#888') + ';margin-bottom:6px;font-weight:600;';
          label.textContent = '💡 症状から選ぶ:';

          var grid = document.createElement('div');
          grid.className = 'ux-symptom-grid';
          grid.setAttribute('role', 'group');
          grid.setAttribute('aria-label', '症状を選択');

          var selectedSymptoms = [];

          SYMPTOM_LIST.forEach(function(symptom) {
            var chip = document.createElement('button');
            chip.className = 'ux-symptom-chip';
            chip.innerHTML = symptom.icon + '<br>' + symptom.label;
            chip.setAttribute('role', 'checkbox');
            chip.setAttribute('aria-checked', 'false');
            chip.setAttribute('aria-label', symptom.label);
            chip.addEventListener('click', function() {
              var isSelected = chip.classList.toggle('ux-selected');
              chip.setAttribute('aria-checked', isSelected ? 'true' : 'false');
              var idx = selectedSymptoms.indexOf(symptom.label);
              if (idx > -1) {
                selectedSymptoms.splice(idx, 1);
              } else {
                selectedSymptoms.push(symptom.label);
              }
              // Update textarea with selected symptoms
              var current = textarea.value;
              // Remove previous symptom prefix
              current = current.replace(/^.+の症状があります。\s*/, '');
              var newVal = selectedSymptoms.length > 0
                ? selectedSymptoms.join('、') + 'の症状があります。' + current
                : current;
              try {
                var nativeSet = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
                nativeSet.call(textarea, newVal);
                textarea.dispatchEvent(new Event('input', { bubbles: true }));
              } catch(e) {
                textarea.value = newVal;
              }
              triggerHaptic('light');
            });
            grid.appendChild(chip);
          });

          // Medical disclaimer
          var disclaimer = document.createElement('div');
          disclaimer.style.cssText = 'font-size:11px;color:' + (isDark ? '#777' : '#aaa') + ';margin:8px 0 4px;line-height:1.5;';
          disclaimer.textContent = '※ AIの回答は参考情報だよ。心配なときは獣医さんに相談してね。';

          textarea.parentNode.insertBefore(label, textarea);
          textarea.parentNode.insertBefore(grid, textarea);
          textarea.parentNode.insertBefore(disclaimer, textarea);
        }, 200);
      };
      clearInterval(_aiReadyCheck);
    }
  }, 300);
  setTimeout(function() { clearInterval(_aiReadyCheck); }, 10000);

  /* ==============================
     24. PWA INSTALL PROMOTION (PWAインストール促進) - Feature E
     ============================== */
  var _deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    _deferredPrompt = e;

    // Check if already dismissed recently
    var dismissed = localStorage.getItem('ux_pwa_dismissed');
    if (dismissed) {
      var dismissedDate = new Date(dismissed);
      var daysSince = (Date.now() - dismissedDate.getTime()) / (1000 * 60 * 60 * 24);
      if (daysSince < 7) return; // Don't show again for 7 days
    }

    // Show banner after 30 seconds of use
    setTimeout(showPWABanner, 30000);
  });

  function showPWABanner() {
    if (!_deferredPrompt) return;
    // Don't show if already installed
    if (window.matchMedia('(display-mode: standalone)').matches) return;

    var existing = document.querySelector('.ux-pwa-banner');
    if (existing) existing.remove();

    var banner = document.createElement('div');
    banner.className = 'ux-pwa-banner';
    banner.innerHTML = '<div class="ux-pwa-banner-icon">🐾</div>' +
      '<div class="ux-pwa-banner-text"><div class="ux-pwa-banner-title">ホーム画面に追加しよう</div><div class="ux-pwa-banner-sub">いつでもサッと日記が書けるようになるよ</div></div>' +
      '<div class="ux-pwa-banner-actions"><button class="ux-pwa-dismiss-btn" id="pwa-dismiss">あとで</button><button class="ux-pwa-install-btn" id="pwa-install">追加する</button></div>';

    document.body.appendChild(banner);

    document.getElementById('pwa-install').addEventListener('click', function() {
      if (_deferredPrompt) {
        _deferredPrompt.prompt();
        _deferredPrompt.userChoice.then(function(result) {
          if (result.outcome === 'accepted') {
            showToast('ホーム画面に追加しました！', 'success');
            var an = window.__wanchan && window.__wanchan.analytics;
            if (an && an.logEvent) an.logEvent('pwa_install', { outcome: 'accepted' });
          }
          _deferredPrompt = null;
        }).catch(function() { _deferredPrompt = null; });
      }
      banner.remove();
    });

    document.getElementById('pwa-dismiss').addEventListener('click', function() {
      safeSetItem('ux_pwa_dismissed', new Date().toISOString());
      banner.style.animation = 'none';
      banner.style.transform = 'translateY(100%)';
      banner.style.transition = 'transform .3s ease';
      setTimeout(function() { banner.remove(); }, 300);
      var an = window.__wanchan && window.__wanchan.analytics;
      if (an && an.logEvent) an.logEvent('pwa_install', { outcome: 'dismissed' });
    });
  }

  // Also show a subtle install hint in the menu for iOS (which doesn't support beforeinstallprompt)
  if ((/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) && !window.matchMedia('(display-mode: standalone)').matches) {
    var btnPWA = document.createElement('button');
    btnPWA.textContent = '📲 ホーム画面に追加';
    btnPWA.addEventListener('click', function() {
      backupMenu.classList.remove('ux-show');
      showToast('Safari の「共有」ボタン → 「ホーム画面に追加」をタップしてね', 'info');
    });
    backupMenu.appendChild(btnPWA);
  }

  /* ==============================
     25. SW UPDATE NOTIFICATION
     ============================== */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(function(reg) {
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', function() {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            var t = document.createElement('div');
            t.className = 'ux-toast ux-toast-info';
            var iconSpan = document.createElement('span');
            iconSpan.className = 'ux-toast-icon';
            iconSpan.textContent = '💡';
            var msgSpan = document.createElement('span');
            msgSpan.textContent = '新しい機能が追加されました！';
            msgSpan.style.cssText = 'flex:1;';
            var updateBtn = document.createElement('button');
            updateBtn.textContent = '更新する';
            updateBtn.style.cssText = 'background:#3B82F6;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;margin-left:8px;';
            updateBtn.setAttribute('aria-label', 'アプリを最新版に更新する');
            updateBtn.addEventListener('click', function() {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
              window.location.reload();
            });
            t.appendChild(iconSpan);
            t.appendChild(msgSpan);
            t.appendChild(updateBtn);
            while (toastContainer.children.length >= 5) {
              toastContainer.firstChild.remove();
            }
            toastContainer.appendChild(t);
            setTimeout(function(){ t.classList.add('ux-toast-out'); }, 10000);
            setTimeout(function(){ t.remove(); }, 10300);
          }
        });
      });
    });
  }

})();
</script>
